name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: chmod +x ./gradlew && ./gradlew :plugin:build :api:build :modules:example-module:build

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Rename artifacts
        run: |
          mv plugin/build/libs/plugin-*.jar plugin/build/libs/NovaScript-${{ steps.version.outputs.VERSION }}.jar
          mv api/build/libs/api-*.jar api/build/libs/NovaScript-API-${{ steps.version.outputs.VERSION }}.jar

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: NovaScript v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: |
            plugin/build/libs/NovaScript-${{ steps.version.outputs.VERSION }}.jar
            api/build/libs/NovaScript-API-${{ steps.version.outputs.VERSION }}.jar
